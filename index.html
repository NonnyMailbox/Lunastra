<!DOCTYPE html>
<html lang="th">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LUNASTRA</title>
    <link rel="stylesheet" href="style.css">


 </head>
 <body>
    <audio id="bgm" loop preload="auto">
        <source src="music/openworld.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const music = document.getElementById('bgm');
            const soundbutton = document.querySelector('.sound');
            const transitionOverlay = document.querySelector('.transition-overlay');
            const exploreButton = document.querySelector('.hero-button');
            const targetSection = document.getElementById('galaxy-section');

            music.volume = 0.5; // Set the volume to 50%

            let playing = false;

            let transitionLocked = false;

            document.querySelectorAll('.navbar a[href="#"]').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                });
            });

            function playTransition() {
                if (!transitionOverlay || transitionLocked) return;
                transitionLocked = true;
                transitionOverlay.classList.remove('is-hidden');
                transitionOverlay.classList.add('is-visible');

                window.setTimeout(function() {
                    transitionOverlay.classList.remove('is-visible');
                    transitionOverlay.classList.add('is-hidden');
                    targetSection.classList.add('is-revealed');
                    transitionLocked = false;
                }, 580);
            }

            soundbutton.addEventListener('click', function(e) {
                e.preventDefault();
                if (!playing) {
                    music.play().then(function() {
                        soundbutton.textContent = '🔊';
                        playing = true;
                    }).catch(function(error) {
                        console.error('Audio play error:', error);
                    });
                } else {
                    music.pause();
                    soundbutton.textContent = '🔇';
                    playing = false;
                }
            });

            if (exploreButton && targetSection) {
                exploreButton.addEventListener('click', function(e) {
                    e.preventDefault();
                    playTransition();
                    setTimeout(function() {
                        targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 180);
                });
            }

            let wheelTriggered = false;
            let wheelAccumulated = 0;
            let wheelDirection = null;

            function resetWheelGesture() {
                wheelAccumulated = 0;
                wheelDirection = null;
            }

            window.addEventListener('wheel', function(e) {
                const currentScrollTop = window.scrollY;
                const scrollingDown = e.deltaY > 0;
                const nearHeroBottom = currentScrollTop < 220;
                const atTop = currentScrollTop <= 10;
                const threshold = 140;

                if (transitionLocked || wheelTriggered) {
                    e.preventDefault();
                    return;
                }

                if (scrollingDown && nearHeroBottom) {
                    if (wheelDirection !== 'down') {
                        wheelDirection = 'down';
                        wheelAccumulated = 0;
                    }

                    wheelAccumulated += Math.abs(e.deltaY);
                    e.preventDefault();

                    if (wheelAccumulated >= threshold) {
                        wheelTriggered = true;
                        playTransition();
                        setTimeout(function() {
                            targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 90);
                        setTimeout(function() {
                            wheelTriggered = false;
                            resetWheelGesture();
                        }, 850);
                    }
                    return;
                }

                if (!scrollingDown && !atTop && currentScrollTop > 120) {
                    if (wheelDirection !== 'up') {
                        wheelDirection = 'up';
                        wheelAccumulated = 0;
                    }

                    wheelAccumulated += Math.abs(e.deltaY);
                    e.preventDefault();

                    if (wheelAccumulated >= threshold) {
                        wheelTriggered = true;
                        playTransition();
                        setTimeout(function() {
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }, 90);
                        setTimeout(function() {
                            wheelTriggered = false;
                            resetWheelGesture();
                        }, 850);
                    }
                    return;
                }

                resetWheelGesture();
            }, { passive: false });
        });
    </script>

    <div class="navbar">
        <div class="logo">
            <span class="logo-icon">✧</span>
            <span class="logo-text">LUNASTRA</span>
        </div>

        <div class="menu">
            <a href="#" data-i18n="home">Home</a>
            <a href="#" data-i18n="about">About</a>
            <a href="#" data-i18n="news">News</a>
            <div class="dropdown">
                <a href="#" data-i18n="information">Information ⏷</a>
                <div class="dropdown-menu">
                    <a href="#" data-i18n="project">Project</a>
                </div>
            </div>
        </div>

        <div class="right-menu">
            <a href="#" class="sound">🔊</a>
            <div class="dropdown">
                <a href="#" class="globe">🌐</a>
                <div class="dropdown-menu">
                    <a href="#" data-lang="th">ภาษาไทย</a>
                    <a href="#" data-lang="en">English</a>
                </div>
            </div>
            <a href="https://www.roblox.com/th/communities/1006317127/Lunastra#!/about" class="shop" data-i18n="shop">Shop 🛍️</a>
        </div>
    </div>

    <div class="transition-overlay" aria-hidden="true"></div>

    <div class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-title-wrap">
                <span class="hero-title-line"></span>
                <span class="hero-title-star">✦</span>
                <span class="hero-title-line"></span>
            </div>
            <h1>LUNASTRA</h1>
            <p data-i18n="welcome">Welcome to my world</p>
            <a href="#galaxy-section" class="hero-button" data-i18n="explore">Explore ✦</a>
            <div class="hero-scroll">⌄</div>
        </div>
    </div>

    <section id="galaxy-section" class="galaxy-section">
        <div class="galaxy-overlay"></div>
        <div class="galaxy-content">
            <p class="section-kicker">A new sky</p>
            <h2>Beyond the first light</h2>
            <p>This section uses the galaxy image as a full-screen background to continue the experience below the hero.</p>
        </div>
    </section>
    
    <script src="lang/en.js"></script>
    <script src="lang/th.js"></script>
    <script src="lang/lang-switcher.js"></script>
 </body>
</html>
